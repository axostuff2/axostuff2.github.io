<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox Update Predictor</title>
    <!-- Importing the Press Start 2P font from Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Press Start 2P', monospace;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            overflow: hidden;
            box-sizing: border-box;
            padding: 20px;
        }

        .question {
            font-size: 24px;
            line-height: 1.8;
            margin-bottom: 60px;
            max-width: 800px;
        }

        .prediction {
            font-size: 72px;
            font-weight: bold;
            letter-spacing: 2px;
        }

        .loading {
            font-size: 16px;
            color: #888888;
        }

        .yes-green {
            color: #00ff00;
        }

        .no-red {
            color: #ff0000;
        }
    </style>
</head>
<body>

    <div class="question">
        Is Roblox gonna have a Good Update tomorrow?
    </div>

    <div id="outcome" class="loading">
        FETCHING DATA...
    </div>

    <script>
        async function checkRobloxStock() {
            const outcomeDiv = document.getElementById('outcome');
            try {
                // Using a reliable open public API to grab daily ticker metrics
                const response = await fetch('https://query1.finance.yahoo.com/v7/finance/options/RBLX');
                const data = await response.json();
                
                // Pull out market pricing properties
                const result = data.optionChain.result[0].quote;
                const priceChange = result.regularMarketChange;

                if (priceChange >= 0) {
                    outcomeDiv.textContent = 'YES';
                    outcomeDiv.className = 'prediction yes-green';
                } else {
                    outcomeDiv.textContent = 'NO';
                    outcomeDiv.className = 'prediction no-red';
                }
            } catch (error) {
                console.error('Error fetching stock data:', error);
                // Fallback parsing option in case of request blocks/CORS restrictions
                outcomeDiv.textContent = 'ERROR';
                outcomeDiv.className = 'loading';
            }
        }

        // Run checking calculation immediately upon load state
        checkRobloxStock();
    </script>

</body>
</html>
