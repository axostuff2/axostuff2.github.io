<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RBXS Shader Pack Unpacker</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1e1e24;
            color: #f5f5f5;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            max-width: 600px;
            width: 100%;
            background-color: #2a2a32;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            text-align: center;
        }
        h1 { margin-top: 0; color: #4a90e2; }
        p { color: #b0b0b8; font-size: 0.95rem; }
        .file-input-wrapper {
            margin: 25px 0;
            position: relative;
        }
        input[type="file"] {
            display: none;
        }
        .custom-file-upload {
            border: 2px dashed #4a90e2;
            display: inline-block;
            padding: 20px 40px;
            cursor: pointer;
            border-radius: 6px;
            background-color: #23232a;
            transition: all 0.3s ease;
        }
        .custom-file-upload:hover {
            background-color: #2d3846;
            border-color: #67a4ed;
        }
        #status {
            margin: 20px 0;
            font-weight: bold;
            color: #00ffcc;
            min-height: 24px;
        }
        button {
            background-color: #27ae60;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s;
            display: none;
        }
        button:hover { background-color: #219653; }
        #fileList {
            margin-top: 20px;
            max-height: 200px;
            overflow-y: auto;
            text-align: left;
            background: #19191e;
            padding: 10px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 0.85rem;
            display: none;
        }
        .file-item { color: #a0a0a8; padding: 2px 0; border-bottom: 1px solid #25252d; }
    </style>
</head>
<body>

<div class="container">
    <h1>RBXS Shader Unpacker</h1>
    <p>Select your <code>shaders_glsles3.pack</code> file to extract all GLSL shader stages natively in your browser.</p>
    
    <div class="file-input-wrapper">
        <label for="fileInput" class="custom-file-upload">
            📁 Choose .pack File
        </label>
        <input type="file" id="fileInput" accept=".pack">
    </div>

    <div id="status">Ready</div>
    <button id="downloadBtn">Download Shaders (.zip)</button>
    
    <div id="fileList"></div>
</div>

<script>
document.getElementById('fileInput').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (!file) return;

    const statusDiv = document.getElementById('status');
    const downloadBtn = document.getElementById('downloadBtn');
    const fileListDiv = document.getElementById('fileList');
    
    statusDiv.style.color = "#00ffcc";
    statusDiv.innerText = "[*] Reading file...";
    downloadBtn.style.display = "none";
    fileListDiv.style.display = "none";
    fileListDiv.innerHTML = "";

    const reader = new FileReader();
    reader.onload = function(event) {
        const arrayBuffer = event.target.result;
        const uint8 = new Uint8Array(arrayBuffer);

        // Verify RBXS Magic Bytes (0x52 0x42 0x58 0x53)
        if (uint8[0] !== 0x52 || uint8[1] !== 0x42 || uint8[2] !== 0x58 || uint8[3] !== 0x53) {
            statusDiv.style.color = "#ff4a4a";
            statusDiv.innerText = "[-] Error: Not a valid RBXS file format.";
            return;
        }

        // Helper to find byte array pattern matches
        const versionString = "#version 300 es";
        const encoder = new TextEncoder();
        const versionBytes = encoder.encode(versionString);
        const markers = [];

        // Scan for #version 300 es blocks
        for (let i = 0; i <= uint8.length - versionBytes.length; i++) {
            let match = true;
            for (let j = 0; j < versionBytes.length; j++) {
                if (uint8[i + j] !== versionBytes[j]) {
                    match = false;
                    break;
                }
            }
            if (match) markers.push(i);
        }

        if (markers.length === 0) {
            statusDiv.style.color = "#ff4a4a";
            statusDiv.innerText = "[-] Error: No GLSL shader blocks found.";
            return;
        }

        // Parse Manifest Names from the data before the first shader
        const firstMarker = markers[0];
        const decoder = new TextDecoder('utf-8');
        const manifestText = decoder.decode(uint8.subarray(0, firstMarker));
        
        // Simple alphanumeric regex matching strings 3+ chars long
        const nameRegex = /[A-Za-z0-9_]{3,}/g;
        const shaderNames = [];
        const ignored = ["supportsHQ", "supportsSHQ", "supportsTextureMSAA", "supportsCompute", "isAppleGpu", "isVR", "devShader", "default"];
        
        let match;
        while ((match = nameRegex.exec(manifestText)) !== null) {
            const name = match[0];
            if (name.startsWith("FFlag") || ignored.includes(name)) continue;
            if (!shaderNames.includes(name)) {
                shaderNames.push(name);
            }
        }

        statusDiv.innerText = `[*] Carving ${markers.length} shaders...`;

        // Initialize JSZip
        const zip = new JSZip();

        // Slice out chunks and assign names
        for (let idx = 0; idx < markers.length; idx++) {
            let startPos = markers[idx];

            // Look backward up to 400 bytes to check for structural //$$ texture binding descriptions
            const lookbackStart = Math.max(0, startPos - 400);
            const lookbackChunk = uint8.subarray(lookbackStart, startPos);
            const lookbackStr = decoder.decode(lookbackChunk);
            const lastCommentIdx = lookbackStr.lastIndexOf("//$$");
            if (lastCommentIdx !== -1) {
                // Adjust start index to encapsulate structural comments
                const byteOffset = encoder.encode(lookbackStr.substring(0, lastCommentIdx)).length;
                startPos = lookbackStart + byteOffset;
            }

            // Establish the trailing boundary boundary
            let endPos = (idx + 1 < markers.length) ? markers[idx + 1] : uint8.length;
            
            // Adjust end position if the next block carries structural comments
            if (idx + 1 < markers.length) {
                const nextStart = markers[idx + 1];
                const nextLookbackStart = Math.max(0, nextStart - 400);
                const nextLookbackChunk = uint8.subarray(nextLookbackStart, nextStart);
                const nextLookbackStr = decoder.decode(nextLookbackChunk);
                const nextCommentIdx = nextLookbackStr.lastIndexOf("//$$");
                if (nextCommentIdx !== -1) {
                    const byteOffset = encoder.encode(nextLookbackStr.substring(0, nextCommentIdx)).length;
                    endPos = nextLookbackStart + byteOffset;
                }
            }

            const shaderChunk = uint8.subarray(startPos, endPos);
            const shaderCodeText = decoder.decode(shaderChunk).trim();

            // Determine safe file name mapping
            let baseName = (idx < shaderNames.length) ? shaderNames[idx] : `unnamed_shader_${idx}`;
            let ext = ".glsl";
            if (baseName.includes("VS")) ext = ".vert";
            else if (baseName.includes("FS")) ext = ".frag";
            else if (baseName.includes("CS")) ext = ".comp";
            
            const finalFilename = baseName + ext;

            // Append file into the virtual ZIP directory
            zip.file(finalFilename, shaderCodeText);

            // Log item visibly on the page interface list
            const item = document.createElement('div');
            item.className = 'file-item';
            item.innerText = `+ ${finalFilename}`;
            fileListDiv.appendChild(item);
        }

        statusDiv.innerText = `[+] Successfully parsed ${markers.length} shaders!`;
        fileListDiv.style.display = "block";
        downloadBtn.style.display = "inline-block";

        // Bind the zip generation routine to the button element
        downloadBtn.onclick = function() {
            statusDiv.innerText = "[*] Generating ZIP archive...";
            zip.generateAsync({type:"blob"}).then(function(content) {
                const link = document.createElement('a');
                link.href = URL.createObjectURL(content);
                link.download = "extracted_shaders.zip";
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                statusDiv.innerText = "[+] Download triggered successfully.";
            });
        };
    };

    reader.readAsArrayBuffer(file);
});
</script>

</body>
</html>
