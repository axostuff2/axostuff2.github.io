<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox Update Predictor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Press Start 2P', monospace;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            overflow: hidden;
            box-sizing: border-box;
            padding: 20px;
        }

        .question {
            font-size: 24px;
            line-height: 1.8;
            margin-bottom: 60px;
            max-width: 800px;
        }

        .prediction {
            font-size: 72px;
            font-weight: bold;
            letter-spacing: 2px;
        }

        .loading {
            font-size: 16px;
            color: #888888;
            animation: blink 1.5s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .yes-green {
            color: #00ff00;
            text-shadow: 0 0 15px rgba(0, 255, 0, 0.4);
        }

        .no-red {
            color: #ff0000;
            text-shadow: 0 0 15px rgba(255, 0, 0, 0.4);
        }
    </style>
</head>
<body>

    <div class="question">
        Is Roblox gonna have a Good Update tomorrow?
    </div>

    <div id="outcome" class="loading">
        FETCHING DATA...
    </div>

    <script>
        async function checkRobloxStock() {
            const outcomeDiv = document.getElementById('outcome');
            try {
                // 1. The target Yahoo Finance URL
                const targetUrl = 'https://query1.finance.yahoo.com/v8/finance/chart/RBLX';
                
                // 2. Wrap it in a public CORS proxy so the browser doesn't block it
                const proxyUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(targetUrl)}`;

                // 3. Fetch the data
                const response = await fetch(proxyUrl);
                if (!response.ok) throw new Error('Network response was not ok');
                
                const data = await response.json();
                
                // 4. Extract the current price and the previous day's close price
                const meta = data.chart.result[0].meta;
                const currentPrice = meta.regularMarketPrice;
                const previousClose = meta.previousClose;

                // 5. Calculate if it went up or down
                if (currentPrice >= previousClose) {
                    outcomeDiv.textContent = 'YES';
                    outcomeDiv.className = 'prediction yes-green';
                } else {
                    outcomeDiv.textContent = 'NO';
                    outcomeDiv.className = 'prediction no-red';
                }
            } catch (error) {
                console.error('Error fetching stock data:', error);
                outcomeDiv.textContent = 'ERROR';
                outcomeDiv.className = 'prediction no-red';
                outcomeDiv.style.fontSize = '32px'; 
            }
        }

        // Run the script as soon as the page loads
        checkRobloxStock();
    </script>

</body>
</html>
